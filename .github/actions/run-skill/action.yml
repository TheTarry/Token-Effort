name: Run Claude Skill
description: >
  Checks out a skill from the central TheTarry/Token-Effort skills repo and runs it via
  Claude Code. Only use this action with trusted, hardcoded inputs — skill_name and prompt
  are interpolated directly into the Claude prompt and must not be derived from untrusted
  sources such as issue titles or PR descriptions.

inputs:
  skill_name:
    description: Name of the skill to run (e.g. "triaging-gh-issues"). Must be a trusted, hardcoded value.
    required: true
  prompt:
    description: >
      Additional context appended after the skill instruction when invoking Claude.
      Must be a trusted, hardcoded value — not derived from user-supplied content.
    required: false
    default: "Apply the skill"
  plugins:
    description: "Newline-separated list of Claude Code plugin names to install (e.g., 'code-review@claude-code-plugins\nfeature-dev@claude-code-plugins')"
    required: false
    default: ""
  allowed_tools:
    description: "Newline-separated list of Claude Code tools which are allowed to be used during this action (e.g. 'Read\nWrite\nEdit')"
    required: false
    default: ""
  claude_code_oauth_token:
    description: Claude Code OAuth token
    required: true
  github_token:
    description: The token to use to authenticate GitHub interactions that are triggered from within Claude
    required: false
    default: ""
  max_turns:
    description: "A limit on the number of autonomous tool-use steps (turns) the AI can take during a single, non-interactive session"
    required: false
    default: "50"
  model:
    description: "The model to use. Accepts either shorthand or fully qualified model name (e.g. 'sonnet' or 'claude-sonnet-4-6')"
    required: false
    default: "sonnet"

runs:
  using: composite
  steps:
    - name: ⤵️ Checkout repository
      uses: actions/checkout@v6

    - name: 🪙 Checkout Token-Effort
      uses: actions/checkout@v6
      with:
        repository: TheTarry/Token-Effort
        path: Token-Effort

    - name: 🔧 Build Claude args
      id: build_args
      shell: bash
      env:
        ALLOWED_TOOLS: ${{ inputs.allowed_tools }}
        MAX_TURNS: ${{ inputs.max_turns }}
        MODEL: ${{ inputs.model }}
      run: |
        ARGS="--max-turns $MAX_TURNS --model $MODEL"
        if [ -n "$ALLOWED_TOOLS" ]; then
          TOOLS=$(echo "$ALLOWED_TOOLS" | tr '\n' ',' | sed 's/,$//')
          ARGS="$ARGS --allowedTools $TOOLS"
        fi
        echo "value=$ARGS" >> "$GITHUB_OUTPUT"

    - name: 🤖 Run Claude Skill
      uses: anthropics/claude-code-action@v1
      env:
        # Any `gh` CLI commands issued by the skill will use the provided token
        GH_TOKEN: ${{ inputs.github_token != '' && inputs.github_token || env.GH_TOKEN }}
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ inputs.github_token }}
        prompt: |
          Read and follow the skill defined in `Token-Effort/claude/skills/${{ inputs.skill_name }}/SKILL.md`.
          ${{ inputs.prompt }}
        claude_args: ${{ steps.build_args.outputs.value }}
        show_full_output: true

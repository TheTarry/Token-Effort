name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to release (e.g. 1.2.3)"
        type: string
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Validate SemVer format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: '${{ inputs.version }}' is not a valid SemVer string (expected X.Y.Z)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Patch plugin.json version
        run: |
          jq --arg version "${{ inputs.version }}" '.version = $version' \
            plugins/token-effort/.claude-plugin/plugin.json > plugin.json.tmp
          mv plugin.json.tmp plugins/token-effort/.claude-plugin/plugin.json

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/token-effort/.claude-plugin/plugin.json
          git commit -m "chore: release v${{ inputs.version }}"
          git push

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        run: |
          gh release create "v${{ inputs.version }}" \
            --generate-notes \
            --title "v${{ inputs.version }}"

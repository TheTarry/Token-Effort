name: Triage GitHub Issues

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  triage:
    name: 🔍 Triage
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write
    steps:
      - name: 🔑 Authenticate as Project Manager
        id: project-manager-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.PROJECT_MANAGER_APP_ID }}
          private-key: ${{ secrets.PROJECT_MANAGER_PRIVATE_KEY }}
          # Obtain a token with access to the owner-level resources (i.e. GH projects)
          owner: ${{ github.repository_owner }}

      - name: 🔍 Diagnose project access
        env:
          GH_TOKEN: ${{ steps.project-manager-token.outputs.token }}
        run: |
          echo "--- gh project list ---"
          gh project list --owner HeadlessTarry --format json --limit 100
          echo "--- issue projectItems (GraphQL) ---"
          gh api graphql -f query='
          query {
            repository(owner: "HeadlessTarry", name: "Token-Effort") {
              issue(number: 27) {
                projectItems(first: 10) {
                  nodes {
                    id
                    project { id number title }
                  }
                }
              }
            }
          }'

      - name: ✨ Run skill
        uses: HeadlessTarry/Token-Effort/.github/actions/run-skill@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.project-manager-token.outputs.token }}
          skill_name: triaging-gh-issues
          prompt: "Triage all open issues in this repository."
          model: haiku
          allowed_tools: |
            Bash(printenv *)
            Bash(git remote get-url *)
            Bash(gh issue list *)
            Bash(gh issue view *)
            Bash(gh search issues *)
            Bash(gh issue edit *)
            Bash(gh issue comment *)
            Bash(gh project list *)
            Bash(gh project item-list *)
            Bash(gh project field-list *)
            Bash(gh project item-edit *)

name: Triage GitHub Issues

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  triage:
    name: 🔍 Triage
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write
    steps:
      - name: ✨ Run skill
        uses: TheTarry/Token-Effort/.github/actions/run-skill@main
        with:
          skill_name: triaging-gh-issues
          prompt: "Triage all open issues in this repository."
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
